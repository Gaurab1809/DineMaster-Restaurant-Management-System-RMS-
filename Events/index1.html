<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include Roboto font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Additional CSS specific to the form */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .event-form {
            margin-top: 20px;
        }
        label {
            margin-bottom: 5px;
        }
        textarea {
            height: 100px;
        }
        .create-event-button {
            padding: 10px 30px;
            font-size: 18px;
            margin-bottom: 20px;
            margin-top: 10px;
            width: 100%;
        }
        .see-events-button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #28a745; /* Green color */
            display: block;
            margin: 0 auto;
            width: 100%; /* Adjusted width */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Management System</h1>
        <form action="process_event.php" method="post" class="event-form">
            <div class="form-group">
                <label for="name" class="form-label">Event Name:</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="description" class="form-label">Description:</label>
                <textarea id="description" name="description" class="form-control"></textarea>
            </div>
            <div class="form-group">
                <label for="start_date" class="form-label">Start Date:</label>
                <input type="date" id="start_date" name="start_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="end_date" class="form-label">End Date:</label>
                <input type="date" id="end_date" name="end_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="start_time" class="form-label">Start Time:</label>
                <input type="time" id="start_time" name="start_time" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="end_time" class="form-label">End Time:</label>
                <input type="time" id="end_time" name="end_time" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary create-event-button">Create Event</button>
            <button type="button" onclick="location.href='events.php';" class="btn btn-success see-events-button">See Events</button>
        </form>
    </div>

    <!-- Include Bootstrap Bundle (JS and Popper.js) for Bootstrap functionalities -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
